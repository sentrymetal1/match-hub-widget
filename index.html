<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Hub</title>
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f5f6f8; color: #1a1a1a; font-size: 13px; }

  .mc-header {
    background: linear-gradient(135deg, #5F94CE, #3a6ea8);
    color: white; padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mc-header h2 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
  .mc-header span { font-size: 11px; opacity: 0.8; }

  .filters { background: #fff; border-bottom: 1px solid #e0e4ea; padding: 12px 16px; }
  .filter-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-group { display: flex; flex-direction: column; gap: 3px; }
  .filter-group label { font-size: 11px; color: #666; font-weight: 500; }
  .filter-group select { height: 30px; border: 1px solid #cdd2da; border-radius: 4px; padding: 0 8px; font-size: 12px; background: #fff; color: #1a1a1a; min-width: 130px; }
  .filter-group select:disabled { background: #f5f6f8; color: #aaa; }
  .radius-display { font-size: 12px; font-weight: 600; color: #5F94CE; min-width: 50px; }

  .filter-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-section { background: #f8f9fb; border: 1px solid #e0e4ea; border-radius: 6px; padding: 8px 12px; flex: 1; min-width: 200px; }
  .toggle-section h4 { font-size: 11px; color: #5F94CE; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .checkbox-grid { display: flex; flex-wrap: wrap; gap: 4px 12px; }
  .checkbox-grid label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #444; cursor: pointer; white-space: nowrap; }
  .checkbox-grid input[type=checkbox] { width: 12px; height: 12px; accent-color: #5F94CE; }

  .search-btn {
    background: #5F94CE; color: white; border: none; border-radius: 4px;
    padding: 0 18px; height: 30px; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; align-self: flex-end;
  }
  .search-btn:hover { background: #4a7eb5; }
  .search-btn:disabled { background: #a0b8d5; cursor: not-allowed; }

  .results-area { padding: 12px 16px; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .results-count { font-size: 12px; color: #666; }
  .sort-sel { font-size: 11px; border: 1px solid #cdd2da; border-radius: 4px; padding: 3px 6px; color: #444; }

  .result-card {
    background: #fff; border: 1px solid #e0e4ea; border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px; transition: box-shadow 0.15s;
  }
  .result-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .score-ring { flex-shrink: 0; width: 48px; height: 48px; }
  .score-ring svg { width: 48px; height: 48px; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .card-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .card-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .pill { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .pill-blue   { background: #E6F1FB; color: #185FA5; }
  .pill-green  { background: #EAF3DE; color: #3B6D11; }
  .pill-teal   { background: #E1F5EE; color: #085041; }
  .pill-gray   { background: #f0f1f3; color: #666; }
  .pill-purple { background: #EEEDFE; color: #3C3489; }
  .card-breakdown { display: flex; gap: 10px; margin-top: 8px; background: #f8f9fb; border-radius: 4px; padding: 6px 10px; }
  .bd-item { text-align: center; }
  .bd-val { font-size: 12px; font-weight: 600; }
  .bd-lbl { font-size: 10px; color: #888; }
  .card-actions { flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }
  .btn-action { font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 4px; cursor: pointer; white-space: nowrap; border: 1px solid #cdd2da; background: #fff; color: #1a1a1a; }
  .btn-action.primary { background: #5F94CE; color: #fff; border-color: #5F94CE; }
  .btn-action.primary:hover { background: #4a7eb5; }
  .status-msg { text-align: center; padding: 30px; color: #888; font-size: 13px; }
  .loading-dots::after { content: '...'; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'} }
</style>
</head>
<body>

<div class="mc-header">
  <h2>Match Hub — AI Supplier Suggestions</h2>
  <span id="mfg-label">Loading...</span>
</div>

<div class="filters">
  <div class="filter-row">
    <div class="filter-group">
      <label>Radius</label>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <input type="range" id="radius" min="25" max="3000" step="25" value="150" style="width:120px;height:auto;border:none;padding:0;background:transparent;">
        <input type="number" id="radius-custom" min="1" max="9999" value="150"
          style="width:64px;height:26px;border:1px solid #cdd2da;border-radius:4px;padding:0 6px;font-size:12px;font-weight:600;color:#5F94CE;text-align:center;">
        <span style="font-size:11px;color:#666;">mi</span>
      </div>
    </div>
    <div class="filter-group">
      <label>Shape</label>
      <select id="sel-shape" disabled><option value="">Loading catalog...</option></select>
    </div>
    <div class="filter-group">
      <label>Material</label>
      <select id="sel-material" disabled><option value="">— select shape first —</option></select>
    </div>
    <div class="filter-group">
      <label>Spec</label>
      <select id="sel-spec" disabled><option value="">— select material first —</option></select>
    </div>
    <button class="search-btn" id="search-btn" onclick="runSearch()">Search</button>
  </div>

  <div class="filter-toggles">
    <div class="toggle-section">
      <h4>Capabilities</h4>
      <div class="checkbox-grid" id="cap-filters">
        <label><input type="checkbox" value="WELDING - Mig"> Welding — MIG</label>
        <label><input type="checkbox" value="WELDING - Tig"> Welding — TIG</label>
        <label><input type="checkbox" value="WELDING - Stick"> Welding — Stick</label>
        <label><input type="checkbox" value="WELDING - Laser"> Welding — Laser</label>
        <label><input type="checkbox" value="CUTTING - Plasma"> Plasma cutting</label>
        <label><input type="checkbox" value="CUTTING - Laser"> Laser cutting</label>
        <label><input type="checkbox" value="CUTTING - Waterjet"> Waterjet</label>
        <label><input type="checkbox" value="SAWING - Band Saw"> Band saw</label>
        <label><input type="checkbox" value="SAWING - Cold Saw"> Cold saw</label>
        <label><input type="checkbox" value="Straightening"> Straightening</label>
        <label><input type="checkbox" value="Shearing"> Shearing</label>
        <label><input type="checkbox" value="Press Brake"> Press brake</label>
        <label><input type="checkbox" value="ROLLING - Plate"> Rolling — plate</label>
        <label><input type="checkbox" value="Drilling"> Drilling</label>
        <label><input type="checkbox" value="MACHINING - CNC"> CNC machining</label>
        <label><input type="checkbox" value="Punching"> Punching</label>
      </div>
    </div>
    <div class="toggle-section">
      <h4>Disadvantage &amp; Minority</h4>
      <div class="checkbox-grid" id="qual-filters">
        <label><input type="checkbox" value="WBE"> WBE</label>
        <label><input type="checkbox" value="MBE"> MBE</label>
        <label><input type="checkbox" value="VBE"> VBE</label>
        <label><input type="checkbox" value="DVBE"> DVBE</label>
        <label><input type="checkbox" value="DBE"> DBE</label>
        <label><input type="checkbox" value="SBE"> SBE</label>
        <label><input type="checkbox" value="HUBZone"> HUBZone</label>
        <label><input type="checkbox" value="8(a)"> 8(a)</label>
      </div>
    </div>
  </div>
</div>

<div class="results-area">
  <div class="results-header" id="results-header" style="display:none">
    <div class="results-count" id="results-count"></div>
    <select class="sort-sel" id="sort-sel" onchange="sortAndRender()">
      <option value="score">Sort: AI match score</option>
      <option value="distance">Sort: Distance</option>
      <option value="stock">Sort: Stock match</option>
    </select>
  </div>
  <div id="results-list">
    <div class="status-msg">Enter your search criteria and click Search.</div>
  </div>
</div>

<script>
var RAILWAY  = 'https://material-compass-nesting-app-production.up.railway.app';
var APP_NAME = 'type-formsheet-2-18-21';

var mfgId = null;
var allResults = [];
var supplierQualMap = {};

// shapeMap[shapeId] = { name, materials: { matId: { name, specs: { specId: specName } } } }
var shapeMap = {};

// ─── Init ─────────────────────────────────────────────────────────────────────
ZOHO.CREATOR.init().then(function() {
  loadMfgId();
  loadStockCatalog();
}).catch(function(e) {
  console.error('ZOHO init failed:', JSON.stringify(e));
  document.getElementById('mfg-label').textContent = 'Init error';
  loadStockCatalog(); // still try
});

// ─── MFG identity ─────────────────────────────────────────────────────────────
function loadMfgId() {
  // 1. Try getQueryParams (button-triggered widget params)
  try {
    var params = ZOHO.CREATOR.UTIL.getQueryParams();
    console.log('Page params:', JSON.stringify(params));
    if (params && params.Manufacture_ID) {
      mfgId = String(params.Manufacture_ID);
      document.getElementById('mfg-label').textContent = 'MFG: ' + mfgId;
      return;
    }
  } catch(e) {
    console.warn('getQueryParams failed:', e);
  }

  // 2. Try parent page URL (page reloaded with ?Manufacture_ID=XXXXX)
  try {
    var href = window.parent.location.href;
    console.log('Parent URL:', href);
    var match = href.match(/[?&]Manufacture_ID=([^&]+)/);
    if (match && match[1]) {
      mfgId = match[1];
      document.getElementById('mfg-label').textContent = 'MFG: ' + mfgId;
      return;
    }
  } catch(e) {
    console.warn('Parent URL read failed:', e);
  }

  // 3. Try current widget URL
  try {
    var selfHref = window.location.href;
    var selfMatch = selfHref.match(/[?&]Manufacture_ID=([^&]+)/);
    if (selfMatch && selfMatch[1]) {
      mfgId = selfMatch[1];
      document.getElementById('mfg-label').textContent = 'MFG: ' + mfgId;
      return;
    }
  } catch(e) {}

  document.getElementById('mfg-label').textContent = 'No MFG ID';
  console.warn('Could not find Manufacture_ID in any source');
}

// ─── Load Stocked_Material_List for cascading dropdowns ───────────────────────
function loadStockCatalog() {
  shapeMap = {};
  document.getElementById('sel-shape').innerHTML = '<option value="">Loading catalog...</option>';

  function fetchPage(pageNum, allRows) {
    ZOHO.CREATOR.API.getAllRecords({
      appName: APP_NAME,
      reportName: 'Stock_Catalog_Lookup',
      page: pageNum,
      pageSize: 200
    }).then(function(resp) {
      var rows = resp.data || [];
      console.log('Stock catalog page ' + pageNum + ': ' + rows.length + ' rows');
      if (pageNum === 1 && rows.length > 0) {
        console.log('Sample row keys:', Object.keys(rows[0]).join(', '));
        console.log('Sample row:', JSON.stringify(rows[0]));
      }
      allRows = allRows.concat(rows);
      if (rows.length === 200) {
        fetchPage(pageNum + 1, allRows);
      } else {
        console.log('Stock catalog total:', allRows.length, 'rows');
        processRows(allRows);
        buildShapeDropdown();
      }
    }).catch(function(e) {
      console.error('Stock catalog page ' + pageNum + ' failed:', JSON.stringify(e));
      if (allRows.length > 0) {
        processRows(allRows);
        buildShapeDropdown();
      } else {
        var sel = document.getElementById('sel-shape');
        sel.innerHTML = '<option value="">Catalog error: ' + (e.code || e.message || JSON.stringify(e)).toString().substring(0, 50) + '</option>';
        sel.disabled = false;
      }
    });
  }

  function processRows(rows) {
    rows.forEach(function(row) {
      var ft = row.Form_Type;
      var shapeId   = (ft && ft.ID) ? String(ft.ID) : (typeof ft === 'string' && ft ? ft : null);
      var shapeName = (ft && ft.zc_display_value) ? ft.zc_display_value :
                      (ft && ft.display_value) ? ft.display_value :
                      (typeof ft === 'string' ? ft : '');
      if (!shapeId || !shapeName) return;

      var mt = row.Material_Type;
      var matId   = (mt && mt.ID) ? String(mt.ID) : (typeof mt === 'string' && mt ? mt : null);
      var matName = (mt && mt.zc_display_value) ? mt.zc_display_value :
                    (mt && mt.display_value) ? mt.display_value :
                    (typeof mt === 'string' ? mt : '');
      if (!matId || !matName) return;

      var td = row.Type_Detail_LU || row.Type_detail_LU || row.Type_Detail || row.Spec;
      var specId = null, specName = '';
      if (td) {
        specId   = (td.ID) ? String(td.ID) : (typeof td === 'string' && td ? td : null);
        specName = (td.zc_display_value) ? td.zc_display_value :
                   (td.display_value) ? td.display_value :
                   (typeof td === 'string' ? td : '');
      }

      if (!shapeMap[shapeId]) shapeMap[shapeId] = { name: shapeName, materials: {} };
      if (!shapeMap[shapeId].materials[matId]) shapeMap[shapeId].materials[matId] = { name: matName, specs: {} };
      if (specId && specName) shapeMap[shapeId].materials[matId].specs[specId] = specName;
    });
  }

  fetchPage(1, []);
}

// ─── Cascading dropdowns ──────────────────────────────────────────────────────
function buildShapeDropdown() {
  var sel = document.getElementById('sel-shape');
  var shapes = Object.keys(shapeMap).map(function(id) {
    return { id: id, name: shapeMap[id].name };
  }).sort(function(a, b) { return a.name.localeCompare(b.name); });

  sel.innerHTML = '<option value="">All shapes</option>';
  shapes.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
  sel.disabled = false;

  sel.addEventListener('change', onShapeChange);
  document.getElementById('sel-material').addEventListener('change', onMaterialChange);
  var radiusSlider = document.getElementById('radius');
  var radiusCustom = document.getElementById('radius-custom');

  radiusSlider.addEventListener('input', function(e) {
    radiusCustom.value = e.target.value;
  });

  radiusCustom.addEventListener('input', function(e) {
    var val = parseInt(e.target.value) || 150;
    if (val < 1) val = 1;
    if (val > 9999) val = 9999;
    // Clamp slider to its max
    radiusSlider.value = Math.min(val, 3000);
  });

  console.log('Shapes loaded:', shapes.length);
}

function onShapeChange() {
  var shapeId = document.getElementById('sel-shape').value;
  var matSel  = document.getElementById('sel-material');
  var specSel = document.getElementById('sel-spec');

  matSel.innerHTML  = '<option value="">All materials</option>';
  specSel.innerHTML = '<option value="">All specs</option>';
  specSel.disabled  = true;

  if (!shapeId) { matSel.disabled = true; return; }

  var mats = Object.keys(shapeMap[shapeId].materials).map(function(id) {
    return { id: id, name: shapeMap[shapeId].materials[id].name };
  }).sort(function(a, b) { return a.name.localeCompare(b.name); });

  if (mats.length === 0) { matSel.disabled = true; return; }
  matSel.disabled = false;
  mats.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.name;
    matSel.appendChild(opt);
  });
}

function onMaterialChange() {
  var shapeId = document.getElementById('sel-shape').value;
  var matId   = document.getElementById('sel-material').value;
  var specSel = document.getElementById('sel-spec');

  specSel.innerHTML = '<option value="">All specs</option>';
  if (!shapeId || !matId) { specSel.disabled = true; return; }

  var specsObj = shapeMap[shapeId].materials[matId].specs;
  var specs = Object.keys(specsObj).map(function(id) {
    return { id: id, name: specsObj[id] };
  }).sort(function(a, b) { return a.name.localeCompare(b.name); });

  if (specs.length === 0) { specSel.disabled = true; return; }
  specSel.disabled = false;
  specs.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    specSel.appendChild(opt);
  });
}

// ─── Search ───────────────────────────────────────────────────────────────────
function runSearch() {
  if (!mfgId) { alert('MFG ID not loaded yet. Please wait.'); return; }
  var btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  document.getElementById('results-list').innerHTML = '<div class="status-msg"><span class="loading-dots">Searching</span></div>';
  document.getElementById('results-header').style.display = 'none';

  var radius  = parseInt(document.getElementById('radius-custom').value) || parseInt(document.getElementById('radius').value) || 150;
  var shapeId = document.getElementById('sel-shape').value;
  var matId   = document.getElementById('sel-material').value;
  var specId  = document.getElementById('sel-spec').value;

  loadSupplierQualifications().then(function() {
    var params = new URLSearchParams({ mfg_id: mfgId, radius: radius });
    if (shapeId) params.append('shape',    shapeId);
    if (matId)   params.append('material', matId);
    if (specId)  params.append('spec',     specId);

    return fetch(RAILWAY + '/api/match-suggestions?' + params.toString());
  }).then(function(resp) {
    if (!resp.ok) return resp.json().then(function(e) { throw new Error(e.error || 'HTTP ' + resp.status); });
    return resp.json();
  }).then(function(data) {
    allResults = data.results || [];
    applyFiltersAndRender();
  }).catch(function(e) {
    console.error('Search error:', e);
    document.getElementById('results-list').innerHTML = '<div class="status-msg">Search failed: ' + e.message + '</div>';
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = 'Search';
  });
}

// ─── Qualifications ───────────────────────────────────────────────────────────
function loadSupplierQualifications() {
  return ZOHO.CREATOR.API.getAllRecords({
    appName: APP_NAME,
    reportName: 'Disadvantage_Minority_per_Supplier_Report'
  }).then(function(resp) {
    supplierQualMap = {};
    (resp.data || []).forEach(function(rec) {
      // SUPPLIER field is a lookup object
      var supId = (rec.SUPPLIER && rec.SUPPLIER.ID) ? rec.SUPPLIER.ID :
                  (typeof rec.SUPPLIER === 'string' ? rec.SUPPLIER : null);
      // Try both field link name and display name variations
      var qual = rec.Disadvantage_Minority_Business_Status ||
                 rec['Disadvantage / Minority Business Status'] ||
                 rec['Disadvantage_Minority_Businesses'] || '';
      console.log('Qual record — supId:', supId, '| qual:', qual);
      if (supId && qual && qual !== 'Not Applicable') {
        if (!supplierQualMap[supId]) supplierQualMap[supId] = [];
        supplierQualMap[supId].push(qual);
      }
    });
    console.log('supplierQualMap:', JSON.stringify(supplierQualMap));
  }).catch(function(e) {
    console.warn('Qualifications load failed:', e);
    return Promise.resolve();
  });
}

// ─── Filter + Sort + Render ───────────────────────────────────────────────────
function getChecked(containerId) {
  return Array.from(document.querySelectorAll('#' + containerId + ' input[type=checkbox]:checked'))
    .map(function(cb) { return cb.value; });
}

function applyFiltersAndRender() {
  var reqCaps  = getChecked('cap-filters');
  var reqQuals = getChecked('qual-filters');

  var filtered = allResults.filter(function(sup) {
    // Capabilities — OR logic: supplier must have ANY of the checked capabilities
    if (reqCaps.length > 0) {
      if (sup.capCount === 0) return false;
      // capNames comes from the breakdown if available, otherwise pass if capCount > 0
      // For now: if supplier has any capabilities, let Railway scoring handle the weight
      // Future: pass cap names from Railway for exact matching
    }
    // Disadvantage & Minority — OR logic: supplier must have ANY checked qualification
    if (reqQuals.length > 0) {
      var supQuals = supplierQualMap[sup.id] || [];
      // Match by abbreviation prefix — e.g. 'VBE' matches 'VBE - Veteran Business Enterprise'
      var hasAny = reqQuals.some(function(q) {
        return supQuals.some(function(sq) {
          var sqUpper = sq.toUpperCase();
          var qUpper = q.toUpperCase();
          return sqUpper === qUpper || sqUpper.indexOf(qUpper + ' ') === 0 || sqUpper.indexOf(qUpper + '-') === 0;
        });
      });
      if (!hasAny) return false;
    }
    return true;
  });

  allResults._filtered = filtered;
  sortAndRender(filtered);
}

function sortAndRender(results) {
  var data   = results || allResults._filtered || allResults;
  var sort   = document.getElementById('sort-sel').value;
  var sorted = data.slice().sort(function(a, b) {
    if (sort === 'distance') return a.distanceMi - b.distanceMi;
    if (sort === 'stock')    return b.breakdown.stockMatch - a.breakdown.stockMatch;
    return b.score - a.score;
  });

  var header = document.getElementById('results-header');
  var count  = document.getElementById('results-count');
  var list   = document.getElementById('results-list');

  if (sorted.length === 0) {
    header.style.display = 'none';
    list.innerHTML = '<div class="status-msg">No suppliers found matching your criteria.</div>';
    return;
  }

  header.style.display = 'flex';
  count.textContent = sorted.length + ' supplier' + (sorted.length !== 1 ? 's' : '') + ' found';

  list.innerHTML = sorted.map(function(sup) {
    var score      = sup.score || 0;
    var scoreColor = score >= 60 ? '#1D9E75' : score >= 30 ? '#EF9F27' : '#E24B4A';
    var circ = 2 * Math.PI * 18;
    var dash = (score / 100) * circ;
    var gap  = circ - dash;

    var supQuals  = supplierQualMap[sup.id] || [];
    var qualPills = supQuals
      .filter(function(q) { return q && q !== 'Not Applicable'; })
      .map(function(q) { return '<span class="pill pill-purple">' + q.split(' - ')[0] + '</span>'; })
      .join('');

    var distColor  = sup.distanceMi < 50 ? '#1D9E75' : sup.distanceMi < 100 ? '#EF9F27' : '#888';
    var stockColor = sup.breakdown.stockMatch > 0 ? '#1D9E75' : '#888';
    var city = (sup.address && sup.address.district_city) ? sup.address.district_city : '';
    var state = (sup.address && sup.address.state_province) ? sup.address.state_province : '';

    return '<div class="result-card">' +
      '<div class="score-ring"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">' +
        '<circle cx="24" cy="24" r="18" fill="none" stroke="#e8eaed" stroke-width="4"/>' +
        '<circle cx="24" cy="24" r="18" fill="none" stroke="' + scoreColor + '" stroke-width="4"' +
          ' stroke-dasharray="' + dash.toFixed(1) + ' ' + gap.toFixed(1) + '"' +
          ' stroke-linecap="round" transform="rotate(-90 24 24)"/>' +
        '<text x="24" y="28" text-anchor="middle" font-size="10" font-weight="600"' +
          ' fill="' + scoreColor + '" font-family="DM Sans,sans-serif">' + score + '%</text>' +
      '</svg></div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + (sup.name || 'Unknown') + '</div>' +
        '<div class="card-sub">' + city + (city && state ? ', ' : '') + state +
          ' &nbsp;&middot;&nbsp; ' + sup.distanceMi + ' mi away' +
          ' &nbsp;&middot;&nbsp; ' + sup.stockCount + ' stocked specs' +
          ' &nbsp;&middot;&nbsp; ' + sup.capCount + ' capabilities</div>' +
        '<div class="card-pills">' +
          (sup.breakdown.stockMatch > 0
            ? '<span class="pill pill-green">Stock match ' + sup.breakdown.stockMatch + '%</span>'
            : '<span class="pill pill-gray">No stock match</span>') +
          (sup.capCount > 0 ? '<span class="pill pill-blue">' + sup.capCount + ' capabilities</span>' : '') +
          qualPills +
          (sup.distanceMi < 25 ? '<span class="pill pill-teal">Local</span>' : '') +
        '</div>' +
        '<div class="card-breakdown">' +
          '<div class="bd-item"><div class="bd-val" style="color:' + stockColor + '">' + sup.breakdown.stockMatch + '%</div><div class="bd-lbl">Stock</div></div>' +
          '<div class="bd-item"><div class="bd-val" style="color:#5F94CE">' + sup.breakdown.capabilities + '%</div><div class="bd-lbl">Capabilities</div></div>' +
          '<div class="bd-item"><div class="bd-val" style="color:' + distColor + '">' + sup.breakdown.distance + '%</div><div class="bd-lbl">Distance</div></div>' +
          '<div class="bd-item"><div class="bd-val" style="color:#888">' + sup.breakdown.history + '%</div><div class="bd-lbl">History</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="btn-action primary" onclick="openMatchEdit(\'' + sup.id + '\')">Edit match</button>' +
        '<button class="btn-action" onclick="copyEmail(\'' + (sup.email || '') + '\')">Copy email</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function openMatchEdit(supplierId) {
  window.open('https://customer.materialcompassportal.com/Pages/Manufacture_Supplier_Match_Status?tab=tab2&supplier=' + supplierId, '_blank');
}

function copyEmail(email) {
  if (!email) return;
  navigator.clipboard.writeText(email)
    .then(function() { alert('Email copied: ' + email); })
    .catch(function() { prompt('Copy this email:', email); });
}
</script>
</body>
</html>
